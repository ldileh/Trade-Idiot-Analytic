# Build the desktop app (Tauri shell + PyInstaller backend sidecar) on Windows.
#
# The app is Windows-only: the backend is bundled as a sidecar exe named
# backend-<rust-target-triple>.exe, which Tauri's externalBin ["bin/backend"]
# resolves to. So the order matters: build the sidecar first, then `tauri build`.
#
# Triggers: manual only (workflow_dispatch). Run it from the Actions tab.
# Pass a `tag` input (e.g. v0.1.1) to build a signed NSIS installer AND publish
# a GitHub Release with the installer + its .sig + latest.json — which is what
# the in-app auto-updater reads from
# releases/latest/download/latest.json. Leave `tag` blank to only build the
# installer as an artifact (no release, no signing needed).
#
# Auto-update requires two repo secrets (Settings → Secrets → Actions):
#   TAURI_SIGNING_PRIVATE_KEY          — contents of src-tauri/tauri-updater.key
#   TAURI_SIGNING_PRIVATE_KEY_PASSWORD — the key's password ("" if none)
# The matching PUBLIC key lives in tauri.conf.json (plugins.updater.pubkey);
# bump the `version` in tauri.conf.json before tagging or the client sees no update.
name: build

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v0.1.1). Blank = build installer artifact only, no release."
        required: false
        default: ""

# Cancel an in-progress run when a newer run starts on the same ref.
concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write # required to create a Release when a tag input is given

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      # --- toolchains ------------------------------------------------------
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      # --- dependencies ----------------------------------------------------
      - name: Install frontend deps
        run: pnpm install --frozen-lockfile

      - name: Install backend deps
        run: pip install -r backend/requirements.txt

      # --- build -----------------------------------------------------------
      # PyInstaller -> backend/dist/backend.exe, copied to
      # src-tauri/bin/backend-x86_64-pc-windows-msvc.exe (needs rustc on PATH
      # for the target triple, provided by the Rust step above).
      - name: Build backend sidecar
        run: python backend/build_sidecar.py

      # tauri-action runs beforeBuildCommand (pnpm build = tsc + vite), builds
      # the NSIS installer, and — because bundle.createUpdaterArtifacts is on and
      # the signing secrets are present — emits the installer's .sig and, when a
      # tag is given, a latest.json the updater reads. With a tag it also creates
      # the GitHub Release and uploads installer + .sig + latest.json.
      - name: Build & release Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          # Key ini dibuat tanpa password → env var dikosongkan (default "").
        with:
          # Empty tagName → build only (artifacts), no release. Set → publish it.
          tagName: ${{ inputs.tag }}
          releaseName: ${{ inputs.tag }}
          releaseDraft: false
          generateReleaseNotes: true
          includeUpdaterJson: true

      # When only building (no tag), keep the installer as a downloadable artifact.
      - name: Upload installer artifact
        if: inputs.tag == ''
        uses: actions/upload-artifact@v4
        with:
          name: trade-idiot-analytic-windows
          retention-days: 14
          if-no-files-found: error
          path: src-tauri/target/release/bundle/nsis/*.exe
