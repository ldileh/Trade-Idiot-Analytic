# Build the desktop app (Tauri shell + PyInstaller backend sidecar).
#
# Two platforms are built from one release:
#  - Windows (windows-latest): sidecar backend-x86_64-pc-windows-msvc.exe,
#    NSIS installer (auto-update) + a hand-zipped portable ZIP (copy-and-run).
#  - macOS Apple Silicon (macos-14, arm64): sidecar backend-aarch64-apple-darwin,
#    .dmg + .app. The .app IS the portable form (drag to Applications); the
#    updater consumes the .app.tar.gz + .sig that createUpdaterArtifacts emits.
#    Unsigned — first launch needs right-click → Open (or xattr -dr quarantine).
#
# The backend is bundled as a sidecar named backend-<rust-target-triple>[.exe],
# which Tauri's externalBin ["bin/backend"] resolves to. PyInstaller can't cross-
# compile, so each OS builds its own sidecar on its own runner.
#
# Triggers:
#  - push to main (a PR from dev merged into main): the `version` job auto-bumps
#    the PATCH version, writes it back to main, tags vX.Y.Z; the `build` matrix
#    then publishes a signed release with both platforms' artifacts + latest.json
#    (what the in-app updater reads from releases/latest/download/latest.json).
#    The bump commit carries [skip ci] so it doesn't re-trigger (no infinite loop).
#  - workflow_dispatch: manual run. Pass `tag` to publish that exact release, or
#    leave it blank to only build artifacts (no release, no bump).
#
# Auto-update requires ONE repo secret (Settings → Secrets → Actions):
#   TAURI_SIGNING_PRIVATE_KEY — contents of src-tauri/tauri-updater.key
# (the key has no password, so no password secret). The matching PUBLIC key
# lives in tauri.conf.json (plugins.updater.pubkey). The same key signs both
# the Windows and macOS updater artifacts.
name: build

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v1.0.1). Blank = build artifacts only, no release."
        required: false
        default: ""

# Serialize main-branch runs so two merges can't race on the version bump.
concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write # required to push the version bump + create the Release

jobs:
  # -----------------------------------------------------------------------------
  # Runs ONCE (not per-OS): on push to main, bump the PATCH version across all four
  # files, commit it back with [skip ci], tag vX.Y.Z. Emits the tag both platforms
  # release into. Manual runs skip the bump and just pass the `tag` input through.
  # -----------------------------------------------------------------------------
  version:
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    outputs:
      tag: ${{ steps.out.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Bump version & tag (push to main)
        if: github.event_name == 'push'
        id: bump
        shell: pwsh
        run: |
          $conf = "src-tauri/tauri.conf.json"
          $cur = (Get-Content $conf | ConvertFrom-Json).version
          $p = $cur.Split(".")
          $new = "$($p[0]).$($p[1]).$([int]$p[2] + 1)"
          Write-Host "Bumping $cur -> $new"
          $e = [regex]::Escape($cur)
          # NOTE: -replace operands MUST be pre-built variables, not inline `A + B`
          # expressions — PowerShell binds -replace tighter than +, so an inline
          # concatenation silently replaces with only the first literal.
          # tauri.conf.json + package.json: the "version" field.
          $jp = '"version": "' + $e + '"'; $jr = '"version": "' + $new + '"'
          (Get-Content $conf -Raw) -replace $jp, $jr | Set-Content $conf -NoNewline
          (Get-Content package.json -Raw) -replace $jp, $jr | Set-Content package.json -NoNewline
          # Cargo.toml [package] version + Cargo.lock package entry.
          $tp = 'version = "' + $e + '"'; $tr = 'version = "' + $new + '"'
          (Get-Content src-tauri/Cargo.toml -Raw) -replace $tp, $tr | Set-Content src-tauri/Cargo.toml -NoNewline
          $lp = '(name = "trade-idiot-analytic"\r?\nversion = ")' + $e + '"'; $lr = '${1}' + $new + '"'
          (Get-Content src-tauri/Cargo.lock -Raw) -replace $lp, $lr | Set-Content src-tauri/Cargo.lock -NoNewline
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src-tauri/tauri.conf.json package.json src-tauri/Cargo.toml src-tauri/Cargo.lock
          git commit -m "chore: release v$new [skip ci]"
          git tag "v$new"
          git push origin HEAD:main
          git push origin "v$new"
          "tag=v$new" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      # The tag to release: bumped tag on push, or the manual `tag` input.
      - name: Resolve release tag
        id: out
        shell: pwsh
        run: |
          $tag = if ("${{ steps.bump.outputs.tag }}") { "${{ steps.bump.outputs.tag }}" } else { "${{ inputs.tag }}" }
          "tag=$tag" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

  # -----------------------------------------------------------------------------
  # Build + release per OS. Both jobs target the SAME tag; tauri-action merges each
  # platform into the shared latest.json, so the updater sees Windows and macOS.
  # -----------------------------------------------------------------------------
  build:
    needs: version
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            triple: x86_64-pc-windows-msvc
          - os: macos-14 # Apple Silicon runner (arm64)
            triple: aarch64-apple-darwin
    runs-on: ${{ matrix.os }}
    steps:
      # Check out the tag we just pushed (so the bumped version is what we build).
      # Falls back to the triggering ref for tagless manual runs.
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.version.outputs.tag || github.ref }}

      # --- toolchains ------------------------------------------------------
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.triple }}

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      # --- dependencies ----------------------------------------------------
      - name: Install frontend deps
        run: pnpm install --frozen-lockfile

      - name: Install backend deps
        run: pip install -r backend/requirements.txt

      # --- build -----------------------------------------------------------
      # PyInstaller -> backend/dist/backend[.exe], copied to
      # src-tauri/bin/backend-<triple>[.exe] (needs rustc on PATH for the triple).
      - name: Build backend sidecar
        run: python backend/build_sidecar.py

      # tauri-action runs beforeBuildCommand (pnpm build), builds the OS bundles
      # (Windows: nsis; macOS: app + dmg), and — because createUpdaterArtifacts is
      # on and the signing secret is present — emits updater artifacts (.sig, and
      # on mac .app.tar.gz) + latest.json. With a tag it creates/updates the shared
      # GitHub Release, merging this platform into the existing latest.json.
      - name: Build & release Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          # Key ini dibuat tanpa password → env var dikosongkan (default "").
        with:
          tagName: ${{ needs.version.outputs.tag }}
          releaseName: ${{ needs.version.outputs.tag }}
          releaseDraft: false
          generateReleaseNotes: true
          includeUpdaterJson: true
          args: --target ${{ matrix.triple }}

      # Windows-only portable: Tauri v2 has no built-in portable target on Windows,
      # so we zip the app exe + the backend sidecar ourselves. Other resources are
      # embedded into the exe by Tauri; only externalBin (the sidecar) sits beside
      # it. This ZIP is copy-and-run — it does NOT auto-update (that needs NSIS).
      # (macOS's portable form is the .app that tauri-action already produced.)
      - name: Package portable ZIP (Windows)
        if: matrix.os == 'windows-latest'
        id: portable
        shell: pwsh
        run: |
          $rel = "src-tauri/target/${{ matrix.triple }}/release"
          $stage = "portable/Trade-Idiot-Analytic"
          New-Item -ItemType Directory -Force -Path $stage | Out-Null
          Copy-Item "$rel/Trade-Idiot-Analytic.exe" $stage
          # .sidecar("backend") resolves to backend-<triple>.exe next to the app exe
          # at runtime, so ship it under that exact name (do NOT rename to backend.exe).
          Copy-Item "$rel/backend-${{ matrix.triple }}.exe" $stage
          $ver = (Get-Content src-tauri/tauri.conf.json | ConvertFrom-Json).version
          $zip = "Trade-Idiot-Analytic_${ver}_x64-portable.zip"
          Compress-Archive -Path "$stage/*" -DestinationPath $zip -Force
          "zip=$zip" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Attach portable ZIP to release (Windows)
        if: matrix.os == 'windows-latest' && needs.version.outputs.tag != ''
        shell: pwsh
        run: gh release upload "${{ needs.version.outputs.tag }}" "${{ steps.portable.outputs.zip }}" --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Tagless build: keep this OS's artifacts downloadable. Globbing both triple
      # paths is harmless — only the current OS's path exists.
      - name: Upload build artifacts
        if: needs.version.outputs.tag == ''
        uses: actions/upload-artifact@v4
        with:
          name: trade-idiot-analytic-${{ matrix.os }}
          retention-days: 14
          if-no-files-found: warn
          path: |
            src-tauri/target/${{ matrix.triple }}/release/bundle/nsis/*.exe
            src-tauri/target/${{ matrix.triple }}/release/bundle/dmg/*.dmg
            ${{ steps.portable.outputs.zip }}
