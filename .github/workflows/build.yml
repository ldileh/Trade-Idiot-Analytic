# Build the desktop app (Tauri shell + PyInstaller backend sidecar) on Windows.
#
# The app is Windows-only: the backend is bundled as a sidecar exe named
# backend-<rust-target-triple>.exe, which Tauri's externalBin ["bin/backend"]
# resolves to. So the order matters: build the sidecar first, then `tauri build`.
#
# Triggers:
#   - push to main / PRs / manual  -> build and upload installers as artifacts
#   - push a tag like v1.2.3        -> also publish a GitHub Release with them
name: build

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Cancel an in-progress run when a newer commit is pushed to the same ref.
concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write # required to create a Release on tag pushes

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      # --- toolchains ------------------------------------------------------
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      # --- dependencies ----------------------------------------------------
      - name: Install frontend deps
        run: pnpm install --frozen-lockfile

      - name: Install backend deps
        run: pip install -r backend/requirements.txt

      # --- build -----------------------------------------------------------
      # PyInstaller -> backend/dist/backend.exe, copied to
      # src-tauri/bin/backend-x86_64-pc-windows-msvc.exe (needs rustc on PATH
      # for the target triple, provided by the Rust step above).
      - name: Build backend sidecar
        run: python backend/build_sidecar.py

      # Runs beforeBuildCommand (pnpm build = tsc + vite), then bundles
      # MSI + NSIS installers into src-tauri/target/release/bundle/.
      - name: Build Tauri app
        run: pnpm tauri build

      # --- outputs ---------------------------------------------------------
      - name: Upload installers
        uses: actions/upload-artifact@v4
        with:
          name: trade-idiot-analytic-windows
          retention-days: 14
          if-no-files-found: error
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*-setup.exe

      - name: Publish release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          generate_release_notes: true
          files: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*-setup.exe
