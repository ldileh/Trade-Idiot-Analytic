# Build the desktop app (Tauri shell + PyInstaller backend sidecar) on Windows.
#
# The app is Windows-only: the backend is bundled as a sidecar exe named
# backend-<rust-target-triple>.exe, which Tauri's externalBin ["bin/backend"]
# resolves to. So the order matters: build the sidecar first, then `tauri build`.
#
# Triggers:
#   - push to main / PRs / manual  -> build a portable ZIP as an artifact
#   - push a tag like v1.2.3        -> also publish a GitHub Release with it
#
# Portable build: with bundle targets ["app"], `tauri build` emits the
# self-contained src-tauri/target/release/trade-idiot-analytic.exe (backend
# sidecar embedded via externalBin) — no installers. We zip that exe; it's
# copy-and-run, no installation needed.
name: build

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Cancel an in-progress run when a newer commit is pushed to the same ref.
concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write # required to create a Release on tag pushes

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      # --- toolchains ------------------------------------------------------
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      # --- dependencies ----------------------------------------------------
      - name: Install frontend deps
        run: pnpm install --frozen-lockfile

      - name: Install backend deps
        run: pip install -r backend/requirements.txt

      # --- build -----------------------------------------------------------
      # PyInstaller -> backend/dist/backend.exe, copied to
      # src-tauri/bin/backend-x86_64-pc-windows-msvc.exe (needs rustc on PATH
      # for the target triple, provided by the Rust step above).
      - name: Build backend sidecar
        run: python backend/build_sidecar.py

      # Runs beforeBuildCommand (pnpm build = tsc + vite), then builds the
      # self-contained release exe (targets: ["app"], no installers).
      - name: Build Tauri app
        run: pnpm tauri build

      # --- package portable ------------------------------------------------
      # A portable build needs BOTH the app exe AND the backend sidecar. With
      # targets ["app"] (--no-bundle) Tauri does NOT copy the sidecar next to
      # the app exe — only the installer-bundling step does that. At runtime the
      # app resolves the sidecar as plain "backend.exe" (target triple stripped)
      # sitting beside it. So we copy the app exe + the sidecar renamed to
      # backend.exe, then zip them — copy-and-run, no install. Verified on a
      # real machine: without backend.exe the app panics in the setup hook with
      # "The system cannot find the file specified (os error 2)".
      - name: Package portable ZIP
        shell: pwsh
        run: |
          $ver = (Get-Content src-tauri/tauri.conf.json | ConvertFrom-Json).version
          $rel = "src-tauri/target/release"
          $stage = "Trade-Idiot-Analytic-$ver-portable"
          New-Item -ItemType Directory -Force -Path $stage | Out-Null
          Copy-Item "$rel/trade-idiot-analytic.exe" $stage/
          $sidecar = Get-ChildItem "src-tauri/bin/backend-*.exe" -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $sidecar) { throw "No backend-*.exe sidecar found in src-tauri/bin — portable build would crash on startup." }
          Copy-Item $sidecar.FullName "$stage/backend.exe"
          if (Test-Path README.md) { Copy-Item README.md $stage/ }
          Compress-Archive -Path "$stage/*" -DestinationPath "$stage.zip" -Force
          Write-Host "Packaged:"; Get-ChildItem $stage | ForEach-Object { Write-Host "  $($_.Name)" }
          "PORTABLE_ZIP=$stage.zip" | Out-File -FilePath $env:GITHUB_ENV -Append

      # --- outputs ---------------------------------------------------------
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: trade-idiot-analytic-windows
          retention-days: 14
          if-no-files-found: error
          path: ${{ env.PORTABLE_ZIP }}

      - name: Publish release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          generate_release_notes: true
          files: ${{ env.PORTABLE_ZIP }}
